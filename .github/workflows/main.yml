name: Build Windows Installer

on:
  workflow_dispatch:  # Permite executar manualmente pelo site do GitHub
  push:
    tags:
      - 'v*'  # Executa quando uma tag de versão é criada (ex: v1.0.0)
  release:
    types: [created]  # Executa quando um release é criado

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        cd backend
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build backend executable
      run: |
        cd backend
        Write-Host "Current directory: $(Get-Location)"
        Write-Host "Python version:"
        python --version
        Write-Host "Building executable..."
        python build_exe_windows.py
        
        Write-Host "Build completed. Checking for executable..."
        # Se o script gerou dentro de 'dist', movemos para a raiz do backend se for necessário
        if (Test-Path "dist\cutting-optimization-backend.exe") {
          Write-Host "✅ Executable found in backend/dist. Moving to backend root..."
          Move-Item -Path "dist\cutting-optimization-backend.exe" -Destination ".\cutting-optimization-backend.exe" -Force
        }
        if (Test-Path "cutting-optimization-backend.exe") {
          Write-Host "✅ Executable is ready in backend root"
        }
      continue-on-error: false
    
    - name: Verify backend executable
      run: |
        if (Test-Path "backend\cutting-optimization-backend.exe") {
          $file = Get-Item "backend\cutting-optimization-backend.exe"
          Write-Host "✅ Backend executable verified successfully!"
          Write-Host "Size: $($file.Length / 1MB) MB"
        } else {
          Write-Host "❌ Backend executable not found!"
          exit 1
        }
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        Write-Host "Installing all dependencies (including dev)..."
        npm install
        Write-Host "Verifying Electron installation..."
        npm list electron
        npm list electron-builder
    
    - name: Build React app
      run: |
        cd frontend
        npm run build
      continue-on-error: false
    
    - name: Verify React build
      run: |
        if (Test-Path "frontend\build\index.html") {
          Write-Host "✅ React build created successfully"
        } else {
          Write-Host "❌ React build not found!"
          exit 1
        }
    
    - name: Build Windows installer
      run: |
        cd frontend
        Write-Host "Verifying Electron before build..."
        npm list electron
        Write-Host "Building Windows installer..."
        $env:ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES="true"
        npm run dist-win
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CI: "false"
        ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"
      continue-on-error: false
    
    - name: List dist files
      run: |
        Write-Host "Files in frontend\dist:"
        if (Test-Path "frontend\dist") {
          Get-ChildItem -Path "frontend\dist" -Recurse | ForEach-Object {
            Write-Host $_.FullName
          }
        } else {
          Write-Host "❌ dist folder not found!"
        }
    
    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: frontend/dist/**/*.exe
        retention-days: 30
        if-no-files-found: error
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2  # Atualizado para a v2 que é mais estável
      with:
        files: frontend/dist/**/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
